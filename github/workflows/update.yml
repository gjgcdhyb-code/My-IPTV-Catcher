name: Auto Update IPTV Hunter

on:
  schedule:
    - cron: '0 */2 * * *' # يشتغل تلقائياً كل ساعتين
  workflow_dispatch: # يخليك تشغله يدوياً بكبسة زر للتجربة

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري جداً لكي يستطيع البوت رفع الملف الجديد للمستودع

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # في حال نسيت ملف ريكوايرمنت، هذا السطر يضمن تثبيت المكتبات الأساسية
          pip install requests beautifulsoup4 cloudscraper googlesearch-python

      - name: Run Integrated Hunter Script
        run: python collect.py # تأكد أن هذا هو اسم ملف البايثون اللي فيه كود الصيد المتكامل

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist.m3u
          # السطر القادم يمنع السكربت من التوقف إذا لم يجد روابط جديدة (No changes)
          git commit -m "Auto-Update: New Streams Captured $(date)" || exit 0
          git push
